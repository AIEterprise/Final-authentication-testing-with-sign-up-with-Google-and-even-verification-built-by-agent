<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Portal</title>
    <meta name="description" content="Secure authentication portal with impeccable design and fluid animations.">
    
    <!-- Fonts: Inter for geometric sans-serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Global Error Handler for Diagnostics -->
    <script>
      window.onerror = function (message, url, line, col, error) {
        alert("CRITICAL ERROR: " + message + "\nAt: " + url + ":" + line + ":" + col);
        return false;
      };
      window.addEventListener('unhandledrejection', function (event) {
        alert("UNHANDLED REJECTION: " + event.reason);
      });
    </script>
    
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-btn" aria-label="Toggle theme">
            <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
    </div>

    <main class="container">
        <!-- Notification toast -->
        <div id="toast" class="toast hidden">
            <span id="toast-msg"></span>
        </div>

        <div class="auth-wrapper">
            <!-- Decorative Background Element -->
            <div class="glow-orb"></div>

            <div class="auth-panel" id="auth-panel">
                <div class="panel-header">
                    <h1 id="panel-title">Welcome Back</h1>
                    <p id="panel-subtitle">Enter your details to sign in to your account.</p>
                </div>

                <div class="google-auth-wrapper">
                    <button id="google-btn" class="btn google-btn">
                        <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.16v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.16C1.43 8.55 1 10.22 1 12s.43 3.45 1.16 4.93l2.85-2.22.83-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.16 7.07l3.68 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                        <span>Continue with Google</span>
                    </button>
                    
                    <div class="divider">
                        <span>or continue with email</span>
                    </div>
                </div>

                <form id="auth-form" class="auth-form">
                    <div class="input-group">
                        <label for="email">Email address</label>
                        <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com">
                    </div>
                    
                    <div class="input-group">
                        <div class="password-header">
                            <label for="password">Password</label>
                            <a href="#" id="forgot-link" class="forgot-link">Forgot password?</a>
                        </div>
                        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">
                    </div>

                    <button type="submit" id="submit-btn" class="btn primary-btn">
                        <span class="btn-text">Sign In</span>
                        <div class="loader"></div>
                    </button>
                </form>

                <div class="panel-footer">
                    <p id="toggle-text">Don't have an account? <a href="#" id="toggle-auth">Sign up</a></p>
                </div>
            </div>

            <!-- Forgot Password Modal / View -->
            <div class="auth-panel hidden" id="forgot-panel">
                <div class="panel-header">
                    <h1>Reset Password</h1>
                    <p>Enter your email to receive a password reset link.</p>
                </div>
                
                <form id="forgot-form" class="auth-form">
                    <div class="input-group">
                        <label for="reset-email">Email address</label>
                        <input type="email" id="reset-email" name="email" required placeholder="you@example.com">
                    </div>

                    <button type="submit" id="reset-btn" class="btn primary-btn">
                        <span class="btn-text">Send Reset Link</span>
                        <div class="loader"></div>
                    </button>
                </form>

                <div class="panel-footer">
                    <p><a href="#" id="back-to-login">Back to login</a></p>
                </div>
            </div>

        </div>
    </main>

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.39/bundled/lenis.min.js"></script>
    
    <!-- Application Logic -->
    <script type="module" src="./auth.js?v=3"></script>
    <script type="module" src="./main.js?v=3"></script>
</body>
</html>
