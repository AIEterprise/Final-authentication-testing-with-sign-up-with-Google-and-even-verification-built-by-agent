<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Authentication Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <style>
        .dashboard-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .dashboard-card {
            background: var(--surface);
            padding: 4rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px -10px var(--shadow-color);
        }
        .user-email {
            font-weight: 600;
            color: var(--accent);
            margin: 1rem 0 2rem;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-btn" aria-label="Toggle theme">
            <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
    </div>

    <main class="dashboard-container">
        <div class="dashboard-card">
            <h1>Welcome to the Dashboard!</h1>
            <p>You have successfully authenticated.</p>
            <span id="user-display" class="user-email"></span>
            <br>
            <button id="logout-btn" class="btn primary-btn" style="margin-top: 1rem;">Sign Out</button>
        </div>
    </main>

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.39/bundled/lenis.min.js"></script>
    
    <!-- Application Logic -->
    <script type="module">
        import { client } from './auth.js';
        
        // Theme toggler logic reuse
        const themeBtn = document.getElementById('theme-btn');
        const root = document.documentElement;
        const savedTheme = localStorage.getItem('theme') || 'dark';
        root.setAttribute('data-theme', savedTheme);

        themeBtn.addEventListener('click', () => {
            const currentTheme = root.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            root.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });

        // Auth checking
        async function checkUser() {
            const { data: { session }, error } = await client.auth.getSession();
            if (!session) {
                window.location.href = './index.html';
                return;
            }
            document.getElementById('user-display').textContent = session.user.email;
        }

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await client.auth.signOut();
            window.location.href = './index.html';
        });

        checkUser();

        // Basic animation
        gsap.from('.dashboard-card', {
            y: 30,
            opacity: 0,
            duration: 0.8,
            ease: 'power3.out'
        });

        // Lenis setup
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            smoothWheel: true
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);
    </script>
</body>
</html>
